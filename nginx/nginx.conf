server {
    listen 80;

    # Frontend — the production-build static assets served by
    # frontend-prod's own Nginx (see frontend/Dockerfile's `production`
    # stage), not the dev server. This proxy fronts that container so both
    # frontend and backend share one origin/port from the browser's view.
    location / {
        proxy_pass         http://frontend-prod:80;
        proxy_set_header   Host $host;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_http_version 1.1;
    }

    # Backend API
    location /api/ {
        proxy_pass         http://backend-prod:8000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        client_max_body_size 110M;
    }
}
