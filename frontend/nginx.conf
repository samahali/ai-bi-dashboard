server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — all routes → index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # No /api/ proxy here deliberately — this container (frontend-prod)
    # only serves static assets. API routing to the backend is owned by
    # the top-level nginx/nginx.conf reverse proxy that fronts both this
    # container and backend-prod under the `production` Compose profile.
    # A duplicate /api/ proxy here previously pointed at "backend" (the
    # dev service name), which doesn't even exist under that profile.

    # Cache static assets aggressively
    location ~* \.(js|css|png|jpg|svg|ico|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_types text/plain text/css application/javascript application/json;
}
